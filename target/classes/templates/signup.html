<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>ShopEasy - Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: linear-gradient(135deg, #ff6b35 0%, #f7c59f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .btn-orange { background: #ff6b35; color: #fff; border: none; }
        .btn-orange:hover { background: #e55a27; color: #fff; }
        .brand { color: #ff6b35; font-weight: 700; font-size: 1.6rem; }
    </style>
</head>
<body>
<div class="card p-4" style="width: 440px; max-width: 95%;">
    <div class="text-center mb-3">
        <span class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEasy</span>
        <h5 class="mt-2 text-muted">Create your account</h5>
    </div>
    <form th:action="@{/signup}" th:object="${customer}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" class="form-control" th:field="*{customerName}" placeholder="John Doe" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" th:field="*{emailId}" placeholder="you@email.com" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Gender</label>
            <select class="form-select" th:field="*{gender}" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Phone Number</label>
            <input type="number" class="form-control" th:field="*{phoneNumber}" placeholder="9876543210" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Delivery Address</label>
            <input type="text" class="form-control" th:field="*{address}" placeholder="123 Main St, City" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" th:field="*{password}" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-orange w-100 fw-semibold">Create Account</button>
    </form>
    <div class="text-center mt-3">
        Already have an account? <a href="/login" class="text-decoration-none" style="color:#ff6b35;">Login</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
