<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>ShopEasy - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: linear-gradient(135deg, #ff6b35 0%, #f7c59f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .btn-orange { background: #ff6b35; color: #fff; border: none; }
        .btn-orange:hover { background: #e55a27; color: #fff; }
        .brand { color: #ff6b35; font-weight: 700; font-size: 1.6rem; }
    </style>
</head>
<body>
<div class="card p-4" style="width: 400px; max-width: 95%;">
    <div class="text-center mb-4">
        <span class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEasy</span>
        <h5 class="mt-2 text-muted">Welcome back!</h5>
    </div>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>
    <form action="/login" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" name="customerName" placeholder="Your name" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-orange w-100 fw-semibold">Login</button>
    </form>
    <div class="text-center mt-3">
        New here? <a href="/signup" class="text-decoration-none" style="color:#ff6b35;">Create account</a>
    </div>
    <hr/>
    <p class="text-center text-muted small mb-0">Admin login: <code>admin / admin</code></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
