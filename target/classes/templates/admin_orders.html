<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>ShopEasy - Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f0f2f5; }
        .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; color: #fff; padding: 20px 0; position: fixed; }
        .sidebar .brand { color: #ff6b35; font-weight: 700; font-size: 1.3rem; padding: 10px 20px 20px; }
        .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 12px 20px; border-radius: 6px; margin: 2px 10px; }
        .sidebar a:hover, .sidebar a.active { background: #ff6b35; color: #fff; }
        .main { margin-left: 220px; padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEasy</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/products"><i class="bi bi-box-seam"></i> Products</a>
    <a href="/admin/customers"><i class="bi bi-people"></i> Customers</a>
    <a href="/admin/orders" class="active"><i class="bi bi-receipt"></i> Orders</a>
    <a href="/admin/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<div class="main">
    <h3 class="fw-bold mb-4"><i class="bi bi-receipt"></i> All Orders</h3>
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Address</th>
                        <th>Total (₹)</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Update</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderId}">1</td>
                        <td th:text="${order.customerName}">Name</td>
                        <td th:text="${order.deliveryAddress}">Address</td>
                        <td th:text="${order.totalAmount}">0</td>
                        <td th:text="${order.orderDate}">Date</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${order.status == 'PENDING'} ? 'bg-warning text-dark' : (${order.status == 'CONFIRMED'} ? 'bg-primary' : 'bg-success')"
                                  th:text="${order.status}">Status</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/orders/update/{id}(id=${order.orderId})}" method="post" class="d-flex gap-1">
                                <select name="status" class="form-select form-select-sm" style="width:130px;">
                                    <option value="PENDING">PENDING</option>
                                    <option value="CONFIRMED">CONFIRMED</option>
                                    <option value="DELIVERED">DELIVERED</option>
                                </select>
                                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-arrow-repeat"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="7" class="text-center text-muted py-4">No orders yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
