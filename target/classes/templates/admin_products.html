<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>ShopEasy - Manage Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f0f2f5; }
        .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; color: #fff; padding: 20px 0; position: fixed; }
        .sidebar .brand { color: #ff6b35; font-weight: 700; font-size: 1.3rem; padding: 10px 20px 20px; }
        .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 12px 20px; border-radius: 6px; margin: 2px 10px; }
        .sidebar a:hover, .sidebar a.active { background: #ff6b35; color: #fff; }
        .main { margin-left: 220px; padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .product-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .btn-orange { background: #ff6b35; color: #fff; border: none; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEasy</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/products" class="active"><i class="bi bi-box-seam"></i> Products</a>
    <a href="/admin/customers"><i class="bi bi-people"></i> Customers</a>
    <a href="/admin/orders"><i class="bi bi-receipt"></i> Orders</a>
    <a href="/admin/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">Products</h3>
        <a href="/admin/products/add" class="btn btn-orange"><i class="bi bi-plus-lg"></i> Add Product</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price (₹)</th>
                        <th>Stock</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <img th:if="${product.productImage != null}"
                                 th:src="${new String(product.productImage)}"
                                 class="product-thumb" alt="img"/>
                            <span th:unless="${product.productImage != null}" class="text-muted small">No img</span>
                        </td>
                        <td th:text="${product.productName}">Name</td>
                        <td><span class="badge bg-secondary" th:text="${product.category}">Cat</span></td>
                        <td th:text="${product.price}">0</td>
                        <td th:text="${product.stock}">0</td>
                        <td>
                            <form th:action="@{/admin/products/delete/{id}(id=${product.productId})}" method="post">
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center text-muted py-4">No products yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
