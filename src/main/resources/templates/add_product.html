<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>ShopEasy - Add Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f0f2f5; }
        .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; color: #fff; padding: 20px 0; position: fixed; }
        .sidebar .brand { color: #ff6b35; font-weight: 700; font-size: 1.3rem; padding: 10px 20px 20px; }
        .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 12px 20px; border-radius: 6px; margin: 2px 10px; }
        .sidebar a:hover, .sidebar a.active { background: #ff6b35; color: #fff; }
        .main { margin-left: 220px; padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn-orange { background: #ff6b35; color: #fff; border: none; }
        .btn-orange:hover { background: #e55a27; color: #fff; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEasy</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/products" class="active"><i class="bi bi-box-seam"></i> Products</a>
    <a href="/admin/customers"><i class="bi bi-people"></i> Customers</a>
    <a href="/admin/orders"><i class="bi bi-receipt"></i> Orders</a>
    <a href="/admin/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<div class="main">
    <h3 class="fw-bold mb-4"><i class="bi bi-plus-circle"></i> Add Product</h3>
    <div class="card p-4" style="max-width: 600px;">
        <form th:action="@{/admin/products/add}" th:object="${product}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Product Name</label>
                <input type="text" class="form-control" th:field="*{productName}" placeholder="e.g. Samsung Galaxy S24" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Product details..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Category</label>
                <select class="form-select" th:field="*{category}" required>
                    <option value="">Select Category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Home">Home</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Price (₹)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="0.00" required/>
                </div>
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Stock</label>
                    <input type="number" class="form-control" th:field="*{stock}" placeholder="0" required/>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Product Image</label>
                <input type="file" class="form-control" name="image" accept="image/*"/>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-orange fw-semibold"><i class="bi bi-check-lg"></i> Save Product</button>
                <a href="/admin/products" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
