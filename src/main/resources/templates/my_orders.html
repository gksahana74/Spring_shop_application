<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>ShopEasy - My Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; color: #ff6b35 !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .badge-pending { background: #ffc107; color: #000; }
        .badge-confirmed { background: #0d6efd; color: #fff; }
        .badge-delivered { background: #198754; color: #fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-bag-heart-fill"></i> ShopEasy</a>
        <div class="d-flex gap-3">
            <a href="/customer/cart" class="nav-link"><i class="bi bi-cart3"></i> Cart</a>
            <a href="/logout" class="nav-link"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="fw-bold mb-4"><i class="bi bi-box-seam"></i> My Orders</h3>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox" style="font-size:3rem;"></i>
        <p class="mt-3 fs-5">No orders yet.</p>
        <a href="/" class="btn" style="background:#ff6b35;color:#fff;">Shop Now</a>
    </div>

    <div class="card mb-3" th:each="order : ${orders}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="fw-bold mb-1">Order #<span th:text="${order.orderId}">0</span></h6>
                    <p class="text-muted small mb-1">
                        <i class="bi bi-calendar3"></i> <span th:text="${order.orderDate}">Date</span>
                    </p>
                    <p class="text-muted small mb-0">
                        <i class="bi bi-geo-alt"></i> <span th:text="${order.deliveryAddress}">Address</span>
                    </p>
                </div>
                <div class="text-end">
                    <p class="fw-bold text-danger mb-1 fs-5">₹<span th:text="${order.totalAmount}">0</span></p>
                    <span class="badge"
                          th:classappend="${order.status == 'PENDING'} ? 'badge-pending' : (${order.status == 'CONFIRMED'} ? 'badge-confirmed' : 'badge-delivered')"
                          th:text="${order.status}">Status</span>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
